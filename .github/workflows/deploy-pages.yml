name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    outputs:
      signaling_url: ${{ steps.cloudflare.outputs.deployment-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Cloudflare Worker
        id: cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Wait for worker HTTPS endpoint
        env:
          SIGNALING_URL: ${{ steps.cloudflare.outputs.deployment-url }}
        run: |
          echo "Waiting for ${SIGNALING_URL} to become reachable..."
          for attempt in {1..18}; do
            if curl --silent --show-error --fail "${SIGNALING_URL}/rooms/HEALTHCHECK" >/dev/null; then
              echo "Worker is reachable."
              exit 0
            fi
            echo "Not ready yet (${attempt}/18), retrying in 10s..."
            sleep 10
          done
          echo "Worker endpoint did not become ready in time." >&2
          exit 1

  build:
    needs: deploy-worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          VITE_SIGNALING_URL: ${{ needs.deploy-worker.outputs.signaling_url }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
