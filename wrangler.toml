name = "fileshare-signal"
main = "cloudflare/worker.js"
compatibility_date = "2026-04-06"
workers_dev = true

[durable_objects]
bindings = [
  { name = "ROOMS", class_name = "RoomCoordinator" },
  { name = "PRESENCE", class_name = "NetworkPresenceCoordinator" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomCoordinator"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["NetworkPresenceCoordinator"]
